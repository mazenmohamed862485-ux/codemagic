name: Move tobest_monorepo to project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Copy files from tobest_monorepo into project
        run: |
          cp -r tobest_monorepo/. .
          rm -rf tobest_monorepo

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move files from tobest_monorepo to project root" || echo "No changes to commit"
          git push
